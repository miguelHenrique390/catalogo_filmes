<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Novo Filme - DevFLIX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
</head>

<body>

    <header class="navbar">
        <h1 class="logo">Dev<span>FLIX</span></h1>
    </header>

    <section class="form-container">
        <h2>Cadastrar Novo Filme</h2>

        <form method="POST" enctype="multipart/form-data" class="form-filme">
            <input type="text" name="titulo" placeholder="Nome do filme" required>
            <input type="text" name="genero" placeholder="Gênero" required>
            <input type="date" name="ano" placeholder="Ano" required>

            <div class="upload-area" id="upload-area">
                <img id="preview-img" class="preview-img" style="display:none;" alt="Preview">
                <div id="upload-placeholder" class="upload-placeholder">
                    <span class="upload-icon">📁</span>
                    <p>Clique ou arraste a imagem da capa</p>
                    <span class="upload-hint">Apenas PNG, JPG ou JPEG</span>
                </div>
                <input type="file" name="capa" id="input-capa" accept=".jpg, .jpeg, .png" required>
            </div>

            <button type="submit" class="btn-save">
                Salvar Filme
            </button>
        </form>

        <a href="{{ url_for('listar_filmes') }}" class="btn-back">
            ← Voltar ao catálogo
        </a>
    </section>

    {% include 'components/loading.html' %}

    <script>
        // Preview da imagem selecionada
        const inputCapa = document.getElementById('input-capa');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.getElementById('upload-placeholder');
        const uploadArea = document.getElementById('upload-area');

        inputCapa.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // Clique na área de upload abre o seletor de arquivo
        uploadArea.addEventListener('click', function () {
            inputCapa.click();
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', function (e) {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', function () {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', function (e) {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                // Validação extra no frontend para o Drag and Drop
                const file = e.dataTransfer.files[0];
                const validExtensions = ['image/jpeg', 'image/png'];

                if (validExtensions.includes(file.type)) {
                    inputCapa.files = e.dataTransfer.files;
                    inputCapa.dispatchEvent(new Event('change'));
                } else {
                    alert('Formato de arquivo inválido. Por favor, envie apenas JPG, JPEG ou PNG.');
                }
            }
        });

        window.addEventListener('load', () => {
            if (typeof Loading !== 'undefined') {
                Loading.attachToForms('Gravando no banco...');
                Loading.attachToLinks('.btn-back', 'Voltando para o catálogo...');
            }
        });
    </script>
</body>

</html>
